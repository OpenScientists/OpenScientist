name: Promote Skill Status

on:
  pull_request_review:
    types: [submitted]

permissions:
  contents: write
  pull-requests: read

jobs:
  promote:
    if: github.event.review.state == 'approved'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          token: ${{ secrets.PAT_TOKEN }}

      - name: Find and promote draft skills
        uses: actions/github-script@v7
        with:
          script: |
            const { execSync } = require('child_process');
            const fs = require('fs');

            // Get skill files changed in this PR
            const base = context.payload.pull_request.base.sha;
            const head = context.payload.pull_request.head.sha;
            const diff = execSync(`git diff --name-only ${base}...${head} -- 'skills/**/*.md'`).toString().trim();

            if (!diff) {
              console.log('No skill files changed in this PR.');
              return;
            }

            const files = diff.split('\n').filter(f => f && !f.includes('_template'));
            let promoted = 0;

            for (const file of files) {
              if (!fs.existsSync(file)) continue;

              let content = fs.readFileSync(file, 'utf8');

              // Only promote draft → reviewed
              if (content.match(/^status:\s*draft\s*$/m)) {
                content = content.replace(/^(status:\s*)draft\s*$/m, '$1reviewed');
                fs.writeFileSync(file, content);
                console.log(`Promoted: ${file}`);
                promoted++;
              }
            }

            if (promoted === 0) {
              console.log('No draft skills to promote.');
              return;
            }

            // Commit the status change
            execSync('git config user.name "github-actions[bot]"');
            execSync('git config user.email "41898282+github-actions[bot]@users.noreply.github.com"');
            execSync('git add skills/');
            execSync(`git commit -m "chore: promote ${promoted} skill(s) from draft to reviewed"`);
            execSync('git push');
            console.log(`Committed: ${promoted} skill(s) promoted to reviewed.`);
