name: Validate Skills

on:
  pull_request:
    paths:
      - 'skills/**/*.md'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pyyaml

      - name: Get changed skill files
        id: changed
        uses: actions/github-script@v7
        with:
          script: |
            const files = await github.paginate(github.rest.pulls.listFiles, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
            });
            const skillFiles = files
              .map(f => f.filename)
              .filter(f => f.startsWith('skills/') && f.endsWith('.md'));
            core.setOutput('files', skillFiles.join(' '));
            console.log('Changed skill files:', skillFiles);

      - name: Validate changed skill files
        env:
          CHANGED: ${{ steps.changed.outputs.files }}
        run: |
          if [ -z "$CHANGED" ]; then
            echo "No skill files changed."
            exit 0
          fi
          echo "Validating: $CHANGED"
          python utils/tools/validate.py $CHANGED
